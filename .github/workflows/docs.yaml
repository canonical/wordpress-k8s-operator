name: Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  docs-checks:
    uses: canonical/operator-workflows/.github/workflows/docs.yaml@main
    permissions:
      contents: read
    secrets: inherit
    with:
      vale-files: '["README.md", "CONTRIBUTING.md"]'
      linkcheck-files: "README.md CONTRIBUTING.md"

